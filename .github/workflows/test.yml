name: GitHub Test suite

on: 
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'
    
    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Build & run tests
      env:
       TELEGRAM_TOKEN: ${{ secrets.production.TELEGRAM_TOKEN }}
       BASE_URL: ${{ secrets.production.BASE_URL }}
       ALERT_CHATID: ${{ secrets.production.ALERT_CHATID }}
       WEBHOOK_URL: ${{ secrets.production.WEBHOOK_URL }}
       MONGO_CONN_STRING: ${{ secrets.production.MONGO_CONN_STRING }}
      shell: bash
      run: |
        BASE_URL=$BASE_URL
        echo $BASE_URL
        echo BASE_URL
        echo '${{ secrets.BASE_URL }}'
        docker-compose -f test-build.yml up \
          --abort-on-container-exit